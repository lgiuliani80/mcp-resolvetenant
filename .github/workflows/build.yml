name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ResolveTenant.csproj

      - name: Build
        run: dotnet build ResolveTenant.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ResolveTenant.csproj --configuration Release --no-build --output artifacts/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resolvetenant-build
          path: artifacts/publish
          if-no-files-found: error
